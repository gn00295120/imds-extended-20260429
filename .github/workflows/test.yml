name: WAAgent Deep Probe
on: [push]

jobs:
  waagent:
    runs-on: ubuntu-latest
    steps:
      - name: Read waagent state
        shell: bash
        run: |
          set +e
          echo "===== /var/lib/waagent contents ====="
          sudo ls -la /var/lib/waagent/ 2>&1 | head -40
          
          echo "===== goal state files ====="
          sudo find /var/lib/waagent -name "*.xml" 2>&1 | head -10
          
          echo "===== Recent goal state ====="
          # Read the latest goal state XML
          for f in $(sudo ls -t /var/lib/waagent/GoalState.*.xml 2>/dev/null | head -2); do
            echo "----- $f -----"
            sudo cat "$f" 2>&1 | head -30
            echo ""
          done
          
          echo "===== ovf-env.xml (may contain hostname, deployment info) ====="
          sudo cat /var/lib/waagent/ovf-env.xml 2>&1 | head -50
          
          echo "===== Provisioning info ====="
          sudo cat /var/lib/waagent/provisioned 2>&1 || echo "no provisioned file"
          sudo cat /var/lib/waagent/HostingEnvironmentConfig.xml 2>&1 | head -50
          
          echo "===== Look for token/secret/cert in waagent ====="
          sudo find /var/lib/waagent -type f \( -name "*.cer" -o -name "*.crt" -o -name "*.pem" -o -name "TransportPrivate.*" \) 2>&1 | head -10
          
          echo "===== TransportCert.pem (used to sign IMDS attested doc) ====="
          sudo cat /var/lib/waagent/TransportCert.pem 2>&1 | head -10
          
          echo "===== Transport Private Key ====="
          sudo ls -la /var/lib/waagent/TransportPrivate.pem 2>&1
          # Don't dump the private key, but confirm it's there
          
          echo "===== /var/log/azure ====="
          sudo ls -la /var/log/azure 2>&1 | head -20
          
          echo "===== /var/log/cloud-init.log (last 30 lines) ====="
          sudo tail -50 /var/log/cloud-init.log 2>&1 | head -40
          
          echo "===== /var/log/cloud-init-output.log ====="
          sudo tail -30 /var/log/cloud-init-output.log 2>&1 | head -30
          
          echo "===== Azure NIC info ====="
          sudo cat /etc/netplan/*.yaml 2>&1 | head -10
          
          echo "===== Azure DHCP lease (often contains identity info) ====="
          sudo cat /var/lib/dhcp/dhclient*.leases 2>&1 | head -50 || echo "no dhcp leases"
          
          echo "===== systemd-networkd ====="
          sudo journalctl -u systemd-networkd -n 30 2>&1 | head -30
          
          true
